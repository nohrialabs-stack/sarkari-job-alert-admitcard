openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: admit-cards
    description: Admit card listings
  - name: mock-tests
    description: Mock test listings
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /admit-cards:
    get:
      operationId: getAdmitCards
      tags: [admit-cards]
      summary: List admit cards
      description: Returns a list of admit card listings scraped from FreeJobAlert
      responses:
        "200":
          description: List of admit cards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdmitCardList"

  /mock-tests:
    get:
      operationId: getMockTests
      tags: [mock-tests]
      summary: List mock tests
      description: Returns a list of mock test listings scraped from FreeJobAlert
      responses:
        "200":
          description: List of mock tests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MockTestList"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    AdmitCard:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        organization:
          type: string
        link:
          type: string
          description: Official government website download link
        firstSeen:
          type: string
          description: ISO timestamp of when this admit card was first indexed
      required:
        - id
        - title
        - organization
        - link
        - firstSeen

    AdmitCardList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AdmitCard"
        lastUpdated:
          type: string
      required:
        - items
        - lastUpdated

    MockTest:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        category:
          type: string
        description:
          type: string
        link:
          type: string
        questionCount:
          type: string
      required:
        - id
        - title
        - category
        - link

    MockTestList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MockTest"
        lastUpdated:
          type: string
        source:
          type: string
          enum: [scraped, fallback]
          description: Whether data was scraped live or served from curated fallback
      required:
        - items
        - lastUpdated
        - source
