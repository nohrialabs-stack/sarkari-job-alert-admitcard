kind = "web"
previewPath = "/"
title = "Sarkari Job Alert"
version = "1.0.0"
id = "artifacts/sarkari-job-alert"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23585

[services.development]
run = "pnpm --filter @workspace/sarkari-job-alert run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sarkari-job-alert", "run", "build" ]
publicDir = "artifacts/sarkari-job-alert/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23585"
BASE_PATH = "/"
